# BreakYourStudy Gradio 固定反代到本机 17860（与 breakyourstudy.service 中 PORT 一致）
upstream gradio_upstream {
    server 127.0.0.1:17860;
}

# HTTP — 无域名时可用 http://公网IP/
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 50M;

    location / {
        proxy_pass http://gradio_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_redirect off;
    }
}

# HTTPS — 证书由 setup-nginx-ecs.sh 用本机公网 IP 生成自签名（浏览器会提示「不安全」，可继续）
# 若有域名且要用 Let’s Encrypt，可改用 certbot 并替换 ssl_certificate 路径。
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/breakyourstudy.crt;
    ssl_certificate_key /etc/nginx/ssl/breakyourstudy.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 50M;

    location / {
        proxy_pass http://gradio_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_redirect off;
    }
}
